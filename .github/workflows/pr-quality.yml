name: Quality Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  framework:
    name: framework
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Check framework alignment
        run: npm run check:framework

  test:
    name: test
    runs-on: ubuntu-latest
    needs:
      - framework

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs:
      - framework

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  build:
    name: build
    runs-on: ubuntu-latest
    needs:
      - framework

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  quality:
    name: quality
    runs-on: ubuntu-latest
    needs:
      - framework
      - test
      - lint
      - build
    if: ${{ always() }}

    steps:
      - name: Check required jobs
        env:
          FRAMEWORK_RESULT: ${{ needs.framework.result }}
          TEST_RESULT: ${{ needs.test.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          for result in "$FRAMEWORK_RESULT" "$TEST_RESULT" "$LINT_RESULT" "$BUILD_RESULT"; do
            if [ "$result" != "success" ]; then
              echo "At least one required job failed or was skipped."
              echo "framework=$FRAMEWORK_RESULT"
              echo "test=$TEST_RESULT"
              echo "lint=$LINT_RESULT"
              echo "build=$BUILD_RESULT"
              exit 1
            fi
          done
